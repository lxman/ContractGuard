name: release

# Pushing a tag like v0.0.1-alpha packs every package at that version, publishes to
# nuget.org, and creates the matching GitHub Release with the nupkgs attached.
#
# nuget.org side (one-time): create a Trusted Publishing policy on your account
# (Account settings -> Trusted Publishing) for this repository and this workflow file,
# and set the repository variable NUGET_USER to your nuget.org username.
#
# No trusted publishing? Delete the "NuGet login" step and push with a classic key:
#   --api-key ${{ secrets.NUGET_API_KEY }}

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for NuGet trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          # 10.x drives the build (slnx support); 8.x runtime executes the net8.0 tests.
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Test
        run: dotnet test -c Release

      - name: Pack
        run: |
          dotnet pack src/ContractGuard.Core      -c Release -p:Version=$VERSION -o artifacts
          dotnet pack src/ContractGuard.Cli       -c Release -p:Version=$VERSION -o artifacts
          dotnet pack src/ContractGuard.MSBuild   -c Release -p:Version=$VERSION -o artifacts
          dotnet pack src/ContractGuard.Analyzers -c Release -p:Version=$VERSION -o artifacts

      - name: NuGet login (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --skip-duplicate

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg --title "$GITHUB_REF_NAME" --generate-notes
